apiVersion: apps/v1
kind: Deployment
metadata:
  name: avgspeed2-app
  namespace: avgspeed
  labels:
    app: avgspeed2-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avgspeed2-app
  template:
    metadata:
      labels:
        app: avgspeed2-app
    spec:
      containers:
        - name: avgspeed2-app
          image:  avgspeed-pod-jmeter:2.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8082

          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djava.awt.headless=true"

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10